version: '3.9'

# ── Local Development Stack ───────────────────────────────────────────────────
# Starts Redis locally. Supabase is cloud-based (no local container needed).
#
# Usage:
#   docker-compose up -d          → start Redis
#   docker-compose down           → stop everything
#   docker-compose logs -f app    → tail app logs

services:

  # ── Redis (rate-limit counters) ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot App ─────────────────────────────────────────────────────────
  # Uncomment after running: mvn clean package -DskipTests
  # app:
  #   image: rate-limiter-service:latest
  #   build: .
  #   container_name: rate-limiter-app
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     SUPABASE_DB_URL: ${SUPABASE_DB_URL}
  #     SUPABASE_DB_USER: ${SUPABASE_DB_USER}
  #     SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  redis_data:
